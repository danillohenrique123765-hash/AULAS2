<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <script src="https://unpkg.com/lucide@latest"></script>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Compra concluída — Vecta</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="page-bg" aria-hidden="true">
    <span class="bg-spot bg-spot-1"></span>
    <span class="bg-spot bg-spot-2"></span>
    <span class="bg-line bg-line-1"></span>
    <span class="bg-line bg-line-2"></span>
  </div>

  <main class="auth-main">
    <section class="auth-section">
      <div class="container auth-container">
        <div class="auth-panel panel success-panel">
          <div class="success-icon">✓</div>

          <div class="auth-copy">
            <span class="section-label">Pagamento confirmado</span>
            <h1>Seu pacote foi comprado com sucesso</h1>
            <p>
              Sua compra foi registrada e os créditos já podem ser disponibilizados na sua conta.
            </p>
          </div>

          <div class="checkout-summary">
            <div class="checkout-row">
              <span>Produto</span>
              <strong id="successProduto">-</strong>
            </div>

            <div class="checkout-row">
              <span>Créditos</span>
              <strong id="successCreditos">-</strong>
            </div>

            <div class="checkout-row">
              <span>Forma de pagamento</span>
              <strong id="successPagamento">-</strong>
            </div>

            <div class="checkout-row">
              <span>Valor pago</span>
              <strong id="successValor">-</strong>
            </div>
          </div>

          <div class="hero-card-actions checkout-actions">
            <a href="creditos.html" class="btn btn-secondary">Voltar para créditos</a>
            <a href="home.html" class="btn btn-primary">Ir para a home</a>
          </div>
        </div>
      </div>
    </section>
  </main>

  <script>
    const params = new URLSearchParams(window.location.search);

    document.getElementById("successProduto").textContent = params.get("produto") || "-";
    document.getElementById("successCreditos").textContent = `${params.get("creditos") || "0"} créditos`;
    document.getElementById("successPagamento").textContent = params.get("pagamento") || "-";
    document.getElementById("successValor").textContent = `R$ ${(params.get("valor") || "0.00").replace(".", ",")}`;
  </script>
</body>
</html>
