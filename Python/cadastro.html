<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <script src="https://unpkg.com/lucide@latest"></script>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Criar conta — Vecta</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body class="auth-body">
  <div class="page-bg" aria-hidden="true">
    <span class="bg-spot bg-spot-1"></span>
    <span class="bg-spot bg-spot-2"></span>
    <span class="bg-line bg-line-1"></span>
    <span class="bg-line bg-line-2"></span>
  </div>

  <header class="header">
    <div class="container nav">
      <a href="index.html" class="logo">VEC<span>TA</span></a>
      <nav class="nav-links">
        <a href="index.html">Voltar ao site</a>
        <a href="login.html">Já tenho conta</a>
      </nav>
    </div>
  </header>

  <main class="auth-main">
    <section class="auth-section">
      <div class="container auth-container">
        <div class="auth-panel panel">
          <div class="auth-copy">
            <span class="section-label">Criação de conta</span>
            <h1>Crie sua conta para começar</h1>
            <p>
              Cadastre-se para acessar sua área e começar a organizar seus leads de forma simples.
            </p>
          </div>

          <form class="auth-form" action="login.html">
            <div class="form-row">
              <label for="nome">Nome completo</label>
              <input type="text" id="nome" placeholder="Seu nome" required />
            </div>

            <div class="form-row">
              <label for="email">E-mail</label>
              <input type="email" id="email" placeholder="voce@empresa.com" required />
            </div>

            <div class="form-row">
              <label for="empresa">Empresa</label>
              <input type="text" id="empresa" placeholder="Nome da empresa" />
            </div>

            <div class="form-row">
              <label for="senha">Senha</label>
              <input type="password" id="senha" placeholder="Crie uma senha" required />
            </div>
            <div class="form-row">
  <label style="font-size: 0.9rem; line-height: 1.4;">
    <input type="checkbox" required />
    Eu concordo com a 
    <a href="privacidade.html">Política de Privacidade</a> 
    e os 
    <a href="termos.html">Termos de Uso</a>
  </label>
</div>
            <button type="submit" class="btn btn-primary full-btn">Criar conta</button>

            <p class="auth-bottom-text">
              Já possui conta?
              <a href="login.html">Fazer login</a>
            </p>
          </form>
        </div>
      </div>
    </section>
  </main>
</body>
</html>
