<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Login — Vecta</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body class="auth-body">
  <div class="page-bg" aria-hidden="true">
    <span class="bg-spot bg-spot-1"></span>
    <span class="bg-spot bg-spot-2"></span>
    <span class="bg-line bg-line-1"></span>
    <span class="bg-line bg-line-2"></span>
  </div>

  <header class="header">
    <div class="container nav">
      <a href="index.html" class="logo">VEC<span>TA</span></a>
      <nav class="nav-links">
        <a href="index.html">Voltar ao site</a>
        <a href="cadastro.html">Criar conta</a>
      </nav>
    </div>
  </header>

  <main class="auth-main">
    <section class="auth-section">
      <div class="container auth-container">
        <div class="auth-panel panel">
          <div class="auth-copy">
            <span class="section-label">Login</span>
            <h1>Entre na sua conta</h1>
            <p>
              Este login é fictício. Ao clicar no botão, o usuário será levado para a home interna.
            </p>
          </div>

          <form class="auth-form" action="home.html">
            <div class="form-row">
              <label for="login-email">E-mail</label>
              <input type="email" id="login-email" placeholder="voce@empresa.com" required />
            </div>

            <div class="form-row">
              <label for="login-senha">Senha</label>
              <input type="password" id="login-senha" placeholder="Digite sua senha" required />
            </div>

            <button type="submit" class="btn btn-primary full-btn">Entrar</button>

            <p class="auth-bottom-text">
              Ainda não tem conta?
              <a href="cadastro.html">Criar conta</a>
            </p>
          </form>
        </div>
      </div>
    </section>
  </main>
</body>
</html>
