<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <script src="https://unpkg.com/lucide@latest"></script>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Checkout — Vecta</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="page-bg" aria-hidden="true">
    <span class="bg-spot bg-spot-1"></span>
    <span class="bg-spot bg-spot-2"></span>
    <span class="bg-line bg-line-1"></span>
    <span class="bg-line bg-line-2"></span>
  </div>

  <main class="auth-main">
    <section class="auth-section">
      <div class="container auth-container">
        <div class="auth-panel panel checkout-panel">
          <div class="auth-copy">
            <span class="section-label">Checkout</span>
            <h1>Finalizar compra</h1>
            <p>
              Escolha a forma de pagamento e preencha os dados para concluir sua compra.
            </p>
          </div>

          <div class="checkout-summary">
            <div class="checkout-row">
              <span>Produto selecionado</span>
              <strong id="checkoutProduto">-</strong>
            </div>

            <div class="checkout-row">
              <span>Créditos</span>
              <strong id="checkoutCreditos">-</strong>
            </div>

            <div class="checkout-row">
              <span>Tipo</span>
              <strong id="checkoutTipo">-</strong>
            </div>

            <div class="checkout-row">
              <span>Valor</span>
              <strong id="checkoutValor">-</strong>
            </div>
          </div>

          <div class="payment-methods">
            <h2 class="checkout-subtitle">Forma de pagamento</h2>

            <label class="payment-option">
              <input type="radio" name="pagamento" value="Pix" checked />
              <span>
                <strong>Pix</strong>
                <small>Confirmação rápida</small>
              </span>
            </label>

            <label class="payment-option">
              <input type="radio" name="pagamento" value="Cartão de Crédito" />
              <span>
                <strong>Cartão de crédito</strong>
                <small>Pagamento parcelado ou recorrente</small>
              </span>
            </label>

            <label class="payment-option">
              <input type="radio" name="pagamento" value="Cartão de Débito" />
              <span>
                <strong>Cartão de débito</strong>
                <small>Confirmação imediata</small>
              </span>
            </label>
          </div>

          <form id="paymentForm" class="payment-form" onsubmit="event.preventDefault(); confirmarCompra();">
            <!-- PIX -->
            <div id="pixFields" class="payment-fields active">
              <h3 class="payment-fields-title">Dados para Pix</h3>

              <div class="form-row">
                <label for="pixNome">Nome completo</label>
                <input type="text" id="pixNome" placeholder="Seu nome completo" />
              </div>

              <div class="form-row">
                <label for="pixCpf">CPF</label>
                <input type="text" id="pixCpf" placeholder="000.000.000-00" />
              </div>

              <div class="form-row">
                <label for="pixEmail">E-mail</label>
                <input type="email" id="pixEmail" placeholder="voce@email.com" />
              </div>
            </div>

            <!-- CRÉDITO -->
            <div id="creditoFields" class="payment-fields">
              <h3 class="payment-fields-title">Dados do cartão de crédito</h3>

              <div class="form-row">
                <label for="creditoNome">Nome no cartão</label>
                <input type="text" id="creditoNome" placeholder="Como está no cartão" />
              </div>

              <div class="form-row">
                <label for="creditoNumero">Número do cartão</label>
                <input type="text" id="creditoNumero" placeholder="0000 0000 0000 0000" />
              </div>

              <div class="payment-grid">
                <div class="form-row">
                  <label for="creditoValidade">Validade</label>
                  <input type="text" id="creditoValidade" placeholder="MM/AA" />
                </div>

                <div class="form-row">
                  <label for="creditoCvv">CVV</label>
                  <input type="text" id="creditoCvv" placeholder="123" />
                </div>
              </div>

              <div class="form-row">
                <label for="creditoCpf">CPF do titular</label>
                <input type="text" id="creditoCpf" placeholder="000.000.000-00" />
              </div>
            </div>

            <!-- DÉBITO -->
            <div id="debitoFields" class="payment-fields">
              <h3 class="payment-fields-title">Dados do cartão de débito</h3>

              <div class="form-row">
                <label for="debitoNome">Nome no cartão</label>
                <input type="text" id="debitoNome" placeholder="Como está no cartão" />
              </div>

              <div class="form-row">
                <label for="debitoNumero">Número do cartão</label>
                <input type="text" id="debitoNumero" placeholder="0000 0000 0000 0000" />
              </div>

              <div class="payment-grid">
                <div class="form-row">
                  <label for="debitoValidade">Validade</label>
                  <input type="text" id="debitoValidade" placeholder="MM/AA" />
                </div>

                <div class="form-row">
                  <label for="debitoCvv">CVV</label>
                  <input type="text" id="debitoCvv" placeholder="123" />
                </div>
              </div>

              <div class="form-row">
                <label for="debitoCpf">CPF do titular</label>
                <input type="text" id="debitoCpf" placeholder="000.000.000-00" />
              </div>
            </div>

            <div class="hero-card-actions checkout-actions">
              <a href="creditos.html" class="btn btn-secondary">Voltar</a>
              <button type="submit" class="btn btn-primary">Confirmar pagamento</button>
            </div>
          </form>
        </div>
      </div>
    </section>
  </main>

  <script>
    const params = new URLSearchParams(window.location.search);

    const produto = params.get("produto") || "Plano";
    const creditos = params.get("creditos") || "0";
    const valor = params.get("valor") || "0.00";
    const tipo = params.get("tipo") || "avulso";

    document.getElementById("checkoutProduto").textContent = produto;
    document.getElementById("checkoutCreditos").textContent = `${creditos} créditos`;
    document.getElementById("checkoutTipo").textContent =
      tipo === "assinatura" ? "Assinatura mensal" : "Compra avulsa";
    document.getElementById("checkoutValor").textContent =
      `R$ ${String(valor).replace(".", ",")}`;

    const paymentRadios = document.querySelectorAll('input[name="pagamento"]');
    const pixFields = document.getElementById("pixFields");
    const creditoFields = document.getElementById("creditoFields");
    const debitoFields = document.getElementById("debitoFields");

    function updatePaymentFields() {
      const metodo = document.querySelector('input[name="pagamento"]:checked').value;

      pixFields.classList.remove("active");
      creditoFields.classList.remove("active");
      debitoFields.classList.remove("active");

      if (metodo === "Pix") {
        pixFields.classList.add("active");
      } else if (metodo === "Cartão de Crédito") {
        creditoFields.classList.add("active");
      } else if (metodo === "Cartão de Débito") {
        debitoFields.classList.add("active");
      }
    }

    paymentRadios.forEach(radio => {
      radio.addEventListener("change", updatePaymentFields);
    });

    function confirmarCompra() {
      const metodo = document.querySelector('input[name="pagamento"]:checked').value;

      const url = `compra-sucesso.html?produto=${encodeURIComponent(produto)}&creditos=${encodeURIComponent(creditos)}&valor=${encodeURIComponent(valor)}&tipo=${encodeURIComponent(tipo)}&pagamento=${encodeURIComponent(metodo)}`;

      window.location.href = url;
    }

    updatePaymentFields();
  </script>
</body>
</html>
